<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 1200px;
      height: 630px;
      background: #030303;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', 'SF Mono', 'Monaco', monospace;
      overflow: hidden;
      position: relative;
    }

    /* Gradient orbs — matches the hero */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
    }
    .orb-1 {
      width: 600px;
      height: 600px;
      background: #fab283;
      top: -220px;
      left: 50%;
      transform: translateX(-50%);
      opacity: 0.12;
    }
    .orb-2 {
      width: 400px;
      height: 400px;
      background: #5c9cf5;
      bottom: -140px;
      left: 18%;
      opacity: 0.08;
    }

    /* Grid pattern — matches the hero */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(37, 37, 37, 0.3) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37, 37, 37, 0.3) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.25;
      mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black 10%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black 10%, transparent 70%);
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      z-index: 1;
      padding: 80px;
      position: relative;
    }

    /* Brand mark — matches the sticky nav */
    .brand-mark {
      display: inline-flex;
      align-items: baseline;
      gap: 4px;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .brand-mark .dollar { color: #fab283; }
    .brand-mark .name { color: #f0f0f0; }

    /* Headline — matches the hero title */
    .headline {
      text-align: center;
      font-size: 68px;
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }
    .headline .line-1 {
      display: block;
      color: #f0f0f0;
    }
    .headline .line-2 {
      display: block;
      background: linear-gradient(135deg, #fab283 0%, #f5a742 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Terminal preview — matches the demo window */
    .terminal {
      margin-top: 8px;
      background: #0a0a0a;
      border: 1px solid #252525;
      border-radius: 12px;
      padding: 20px 28px;
      font-size: 22px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow:
        0 4px 6px -1px rgba(0, 0, 0, 0.3),
        0 10px 30px -5px rgba(0, 0, 0, 0.4),
        0 0 0 1px rgba(255, 255, 255, 0.03);
    }
    .terminal .prompt {
      color: #fab283;
      font-weight: 600;
    }
    .terminal .cmd {
      color: #f0f0f0;
    }
    .terminal .arrow {
      color: #7fd88f;
    }
    .terminal .out {
      color: #b8b8b8;
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="container">
    <div class="brand-mark">
      <span class="dollar">$</span>
      <span class="name">msh</span>
    </div>
    <h1 class="headline">
      <span class="line-1">Talk to your terminal.</span>
      <span class="line-2">In plain English.</span>
    </h1>
    <div class="terminal">
      <span class="prompt">$</span>
      <span class="cmd">msh "undo my last commit"</span>
    </div>
  </div>
</body>
</html>
